# Starter UDB description for the simulation-first RV32I core.
# This file is intended to live close to the DUT and document the expected
# implementation envelope. Validate the exact schema against the current
# riscv-unified-db release before certification runs.

dut:
  name: rv32i-softcore
  xlen: 32
  isa: RV32I_Zicsr
  privilege_modes:
    machine: true
    supervisor: false
    user: false
  reset_pc: 0x80000000
  mtvec_reset: 0x80000100
  misa_reset: 0x40000100
  mhartid: 0
  misaligned:
    instruction: trap
    load: trap
    store: trap
  memory_regions:
    - name: ram
      base: 0x80000000
      size: 0x00010000
    - name: tohost
      base: 0x8000fff8
      size: 0x00000004
    - name: fromhost
      base: 0x8000fffc
      size: 0x00000004
  csr_map:
    - mstatus
    - misa
    - mtvec
    - mscratch
    - mepc
    - mcause
    - mtval
    - mhartid
